name: BJJ Atlas - Weekly Scrape

on:
  schedule:
    # Every Monday at 06:00 UTC
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Scrape IBJJF events
        continue-on-error: true
        run: |
          response=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/scrape?source=ibjjf")
          echo "$response"

      - name: Wait between scrapers
        run: sleep 5

      - name: Scrape Eventbrite events
        continue-on-error: true
        run: |
          response=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/scrape?source=eventbrite")
          echo "$response"

      - name: Wait between scrapers
        run: sleep 5

      - name: Scrape Smoothcomp events
        continue-on-error: true
        run: |
          response=$(curl -s -w "\n%{http_code}" -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.APP_URL }}/api/cron/scrape?source=smoothcomp")
          echo "$response"
